<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sana Özel Bir Sürpriz...</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="bg-hearts">
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
    </div>

    <div class="app-container">
        <h1 class="title">Puzzle'ı Tamamla</h1>
        <p class="subtitle">Parçaları yuvalarına sürükle...</p>
        
        <div id="puzzle-board" class="puzzle-board"></div>
        <div id="pieces-tray" class="pieces-tray"></div>
    </div>

    <div id="fake-alert-overlay" class="overlay hidden">
        <div class="fake-alert">
            <div class="alert-icon">⚠️</div>
            <h2 class="alert-title">Sistem Hatası</h2>
            <p class="alert-message">Güzelliğiniz internet akışını bozuyor. <br> Lütfen bekleyiniz...</p>
            <button id="alert-btn" class="alert-btn">Tamam</button>
        </div>
    </div>

    <div id="cards-container" class="cards-wrapper hidden-cards">
        
        <div class="love-card active-card" id="card-1">
            <p class="card-text">Eğer bana evet dersen</p>
            <button class="next-card-btn" data-next="2">Devam Et</button>
        </div>

        <div class="love-card" id="card-2">
            <p class="card-text">Baştan aşağı mutluluk olurum, bırakırım şairliği</p>
            <button class="next-card-btn" data-next="3">Devam Et</button>
        </div>

        <div class="love-card" id="card-3">
            <p class="card-text">şairlik zaten mutsuz adam işi.</p>
            <button class="next-card-btn" data-next="4">Devam Et</button>
        </div>

        <div class="love-card" id="card-4">
    <p class="card-text">
        Senden âlâ şiir mi var?<br> 
        Senin yüzünden âlâ?
    </p>
    <button class="next-card-btn final-btn" id="final-btn">Seni Çok Seviyorum.</button>
    
    <div id="final-bouquet-container" class="bouquet-wrapper"></div>
</div>

    </div>

    <script src="script.js"></script>
</body>
</html>
